<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Password</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-hover: #115e59;
      --secondary: #334155;
      --border: #d1d5db;
      --danger: #b91c1c;
      --success: #166534;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(120deg, #e2e8f0 0%, #f4f6f8 48%, #dbeafe 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
      padding: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 13px;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      padding: 10px 14px;
      font-weight: 600;
      font-size: 14px;
      background: var(--primary);
    }

    button:hover {
      background: var(--primary-hover);
    }

    button.secondary {
      background: var(--secondary);
    }

    .message {
      margin-top: 14px;
      min-height: 20px;
      font-size: 13px;
    }

    .message.err {
      color: var(--danger);
    }

    .message.ok {
      color: var(--success);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Set Password</h1>
    <p>Step 1: click Send OTP. Step 2: enter OTP and new password. Account will activate after successful submit.</p>

    <label for="email">Email</label>
    <input id="email" type="email" value="{{ prefilled_email|default:'' }}" autocomplete="email" />

    <div class="actions">
      <button id="sendOtpBtn" type="button">Send OTP</button>
    </div>

    <label for="otp">OTP</label>
    <input id="otp" type="text" maxlength="6" autocomplete="one-time-code" />

    <label for="password">New Password</label>
    <input id="password" type="password" autocomplete="new-password" />

    <label for="confirmPassword">Confirm Password</label>
    <input id="confirmPassword" type="password" autocomplete="new-password" />

    <div class="actions">
      <button id="setPasswordBtn" type="button">Activate Account</button>
      <button id="clearBtn" class="secondary" type="button">Clear</button>
    </div>

    <div id="message" class="message"></div>
  </div>

  <script>
    (function () {
      const emailInput = document.getElementById('email');
      const otpInput = document.getElementById('otp');
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const messageEl = document.getElementById('message');

      function showMessage(msg, ok) {
        messageEl.textContent = msg;
        messageEl.className = 'message ' + (ok ? 'ok' : 'err');
      }

      async function postJson(url, payload) {
        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        let data = {};
        try {
          data = await response.json();
        } catch (e) {
          data = {};
        }

        if (!response.ok) {
          throw new Error(data.message || data.detail || JSON.stringify(data));
        }

        return data;
      }

      document.getElementById('sendOtpBtn').addEventListener('click', async function () {
        const email = emailInput.value.trim().toLowerCase();
        if (!email) {
          showMessage('Email is required.', false);
          return;
        }

        try {
          await postJson('/api/v1/users/request-password-otp/', { email: email });
          showMessage('OTP sent to your email.', true);
        } catch (err) {
          showMessage(err.message || 'Failed to send OTP.', false);
        }
      });

      document.getElementById('setPasswordBtn').addEventListener('click', async function () {
        const email = emailInput.value.trim().toLowerCase();
        const otp = otpInput.value.trim();
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (!email || !otp || !password || !confirmPassword) {
          showMessage('All fields are required to activate account.', false);
          return;
        }

        try {
          await postJson('/api/v1/users/set-password/', {
            email: email,
            otp: otp,
            password: password,
            confirm_password: confirmPassword
          });
          showMessage('Account activated successfully. You can now login.', true);
        } catch (err) {
          showMessage(err.message || 'Failed to set password.', false);
        }
      });

      document.getElementById('clearBtn').addEventListener('click', function () {
        otpInput.value = '';
        passwordInput.value = '';
        confirmPasswordInput.value = '';
        showMessage('', true);
      });
    })();
  </script>
</body>
</html>
